apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.natsServiceName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.natsServiceName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.natsServiceName" . }}
    spec:
      containers:
        - name: nats
          image: nats:2.11-alpine
          args:
            - --jetstream
            - --http_port=8222
          ports:
            - containerPort: {{ .Values.nats.port }}

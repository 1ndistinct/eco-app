apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.todoApiServiceName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.todoApiServiceName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.todoApiServiceName" . }}
    spec:
      containers:
        - name: todo-api
          image: "{{ .Values.images.todoApi.repository }}:{{ .Values.images.todoApi.tag }}"
          imagePullPolicy: {{ .Values.images.todoApi.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.appPort }}
          env:
            - name: DATABASE_URL
              value: {{ include "app.databaseURL" . | quote }}
            - name: NATS_URL
              value: "nats://{{ include "app.natsServiceName" . }}:{{ .Values.nats.port }}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.appPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.appPort }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.webNicoleServiceName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app.webNicoleServiceName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app.webNicoleServiceName" . }}
    spec:
      containers:
        - name: web-nicole
          image: "{{ .Values.images.webNicole.repository }}:{{ .Values.images.webNicole.tag }}"
          imagePullPolicy: {{ .Values.images.webNicole.pullPolicy }}
          ports:
            - containerPort: 80

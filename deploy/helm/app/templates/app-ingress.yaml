{{- $fullname := include "app.fullname" . -}}
{{- if .Values.ingress.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.webServiceName" . }}
  annotations:
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
{{- end }}
  rules:
    - host: {{ default (printf "%s.localhost" $fullname) .Values.ingress.web.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.webServiceName" . }}
                port:
                  number: {{ .Values.service.webPort }}
{{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- end }}
{{- if .Values.ingress.app.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "app.appServiceName" . }}
  annotations:
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
{{- end }}
  rules:
    - host: {{ default (printf "api.%s.localhost" $fullname) .Values.ingress.app.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "app.appServiceName" . }}
                port:
                  number: {{ .Values.service.appPort }}
{{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- end }}

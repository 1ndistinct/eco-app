{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "app.fullname" . }}
spec:
  entryPoints:
{{- range .Values.ingress.entryPoints }}
    - {{ . }}
{{- end }}
  routes:
    - kind: Rule
      match: ({{ include "app.ingressHostMatch" . }}) && PathPrefix(`{{ .Values.ingress.apiPathPrefix }}`)
      services:
        - name: {{ include "app.appServiceName" . }}
          port: {{ .Values.service.appPort }}
    - kind: Rule
      match: ({{ include "app.ingressHostMatch" . }}) && (Path(`/todo/remoteEntry.js`) || PathPrefix(`/todo/assets/`))
      services:
        - name: {{ include "app.webTodoServiceName" . }}
          port: {{ .Values.service.webPort }}
    - kind: Rule
      match: ({{ include "app.ingressHostMatch" . }}) && PathPrefix(`/`)
      services:
        - name: {{ include "app.webServiceName" . }}
          port: {{ .Values.service.webPort }}
{{- end }}

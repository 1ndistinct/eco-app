server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = /todo/remoteEntry.js {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location /todo/assets/ {
    try_files $uri =404;
  }

  location /todo/ {
    try_files $uri =404;
  }

  location / {
    return 404;
  }
}

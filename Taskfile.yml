version: "3"

tasks:
  setup:
    desc: Verify local tooling needed for the repo workflows
    cmds:
      - |
        sh -c 'set -eu; \
        for tool in go pnpm docker kubectl helm tilt; do \
          command -v "$tool" >/dev/null 2>&1 || { echo "missing required tool: $tool" >&2; exit 1; }; \
        done'

  install:
    desc: Install frontend dependencies
    cmds:
      - pnpm --dir services/web install --no-frozen-lockfile
      - pnpm --dir services/web-todo install --no-frozen-lockfile

  k3d:bootstrap:
    desc: Create the local k3d registry and cluster if they do not already exist
    cmds:
      - |
        sh -c 'set -eu; \
        registry_name="${K3D_REGISTRY_NAME:-echo-registry.localhost}"; \
        registry_node_name="$registry_name"; \
        case "$registry_node_name" in \
          k3d-*) ;; \
          *) registry_node_name="k3d-$registry_node_name" ;; \
        esac; \
        cluster_name="${K3D_CLUSTER_NAME:-echo}"; \
        ingress_port="${APP_INGRESS_PORT:-80}"; \
        registry_port="${PUSH_REGISTRY_PORT:-5001}"; \
        if ! k3d registry list | awk "NR > 1 { print \$1 }" | grep -qx "$registry_node_name"; then \
          k3d registry create "$registry_name" --port "$registry_port"; \
        fi; \
        if ! k3d cluster list | awk "NR > 1 { print \$1 }" | grep -qx "$cluster_name"; then \
          k3d cluster create "$cluster_name" --servers 1 --agents 0 --wait \
            --registry-use "k3d-$registry_name:5000" \
            -p "$ingress_port:80@loadbalancer"; \
        fi'

  dev:
    desc: Run the shell backend API locally against Postgres
    cmds:
      - go run ./services/app-shell migrate
      - go run ./services/app-shell

  dev:todo:
    desc: Run the todo backend API locally against Postgres
    cmds:
      - go run ./services/app-todo migrate
      - go run ./services/app-todo

  user:create:cluster:
    desc: Provision a user inside the deployed cluster and print the generated password
    cmds:
      - sh ./services/app/scripts/create-cluster-user.sh

  test:backend:
    desc: Run backend tests
    cmds:
      - go test ./services/app/... ./services/app-shell/... ./services/app-todo/...

  test:frontend:
    desc: Run frontend unit tests
    cmds:
      - task install
      - sh -c 'TZ=UTC pnpm --dir services/web test -- --run'
      - sh -c 'TZ=UTC pnpm --dir services/web-todo test -- --run'

  test:
    desc: Run backend and frontend tests
    cmds:
      - task test:backend
      - task test:frontend

  test:e2e:
    desc: Run browser end-to-end tests against the deployed app
    cmds:
      - task install
      - |
        sh -c 'set -eu; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        default_host="$(awk '\''/^ingress:/{in_ingress=1; next} in_ingress && /^[^[:space:]]/{in_ingress=0} in_ingress && $1 == "host:" { print $2; exit } in_ingress && $1 == "-" { print $2; exit }'\'' "$values_file")"; \
        host="${INGRESS_HOST:-${default_host:-app.localhost}}"; \
        PLAYWRIGHT_BASE_URL="${PLAYWRIGHT_BASE_URL:-http://$host}" pnpm --dir services/web test:e2e'

  lint:backend:
    desc: Run backend formatting checks
    cmds:
      - sh -c 'out=$(gofmt -l $(find services/app services/app-shell services/app-todo -name "*.go" -type f)); test -z "$out" || { printf "gofmt required for:\n%s\n" "$out" >&2; exit 1; }'

  lint:frontend:
    desc: Run frontend linting
    cmds:
      - task install
      - pnpm --dir services/web lint
      - pnpm --dir services/web-todo lint

  lint:
    desc: Run backend and frontend linting
    cmds:
      - task lint:backend
      - task lint:frontend

  build:backend:
    desc: Build the shell and todo backend binaries
    cmds:
      - |
        sh -c 'set -eu; \
        mkdir -p .cache/bin; \
        go build -o .cache/bin/app-api ./services/app-shell; \
        go build -o .cache/bin/todo-api ./services/app-todo'

  build:frontend:
    desc: Build the frontend bundle
    cmds:
      - task install
      - pnpm --dir services/web build
      - pnpm --dir services/web-todo build

  build:
    desc: Build backend and frontend artifacts
    cmds:
      - task build:backend
      - task build:frontend

  docker:build:app:
    desc: Build the shell backend image with Docker
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-app:${IMAGE_TAG:-dev}"; \
        docker build -f services/app-shell/Dockerfile -t "$ref" .'

  docker:build:todo-api:
    desc: Build the todo backend image with Docker
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-todo-api:${IMAGE_TAG:-dev}"; \
        docker build -f services/app-todo/Dockerfile -t "$ref" .'

  docker:build:web:
    desc: Build the frontend image with Docker
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-web:${IMAGE_TAG:-dev}"; \
        docker build -f services/web/Dockerfile -t "$ref" .'

  docker:build:web-todo:
    desc: Build the todo remote image with Docker
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-web-todo:${IMAGE_TAG:-dev}"; \
        docker build -f services/web-todo/Dockerfile -t "$ref" .'

  docker:build:
    desc: Build the backend and frontend images with Docker
    cmds:
      - task docker:build:app
      - task docker:build:todo-api
      - task docker:build:web
      - task docker:build:web-todo

  docker:push:app:
    desc: Build and push the shell backend image with Docker
    cmds:
      - task docker:build:app
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-app:${IMAGE_TAG:-dev}"; \
        docker push "$ref"'

  docker:push:todo-api:
    desc: Build and push the todo backend image with Docker
    cmds:
      - task docker:build:todo-api
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-todo-api:${IMAGE_TAG:-dev}"; \
        docker push "$ref"'

  docker:push:web:
    desc: Build and push the frontend image with Docker
    cmds:
      - task docker:build:web
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-web:${IMAGE_TAG:-dev}"; \
        docker push "$ref"'

  docker:push:web-todo:
    desc: Build and push the todo remote image with Docker
    cmds:
      - task docker:build:web-todo
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-localhost:5001}/echo-agentic-todo-postfix-20260411210213-web-todo:${IMAGE_TAG:-dev}"; \
        docker push "$ref"'

  docker:push:
    desc: Build and push the backend and frontend images with Docker
    cmds:
      - task docker:push:app
      - task docker:push:todo-api
      - task docker:push:web
      - task docker:push:web-todo

  image:app:
    desc: Build and push the shell backend image with BuildKit
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-k3d-echo-registry.localhost:5000}/echo-agentic-todo-postfix-20260411210213-app:${IMAGE_TAG:-dev}"; \
        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename=services/app-shell/Dockerfile \
          --output type=image,name="$ref",push=true,registry.insecure=true'

  image:todo-api:
    desc: Build and push the todo backend image with BuildKit
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-k3d-echo-registry.localhost:5000}/echo-agentic-todo-postfix-20260411210213-todo-api:${IMAGE_TAG:-dev}"; \
        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename=services/app-todo/Dockerfile \
          --output type=image,name="$ref",push=true,registry.insecure=true'

  image:web:
    desc: Build and push the frontend image with BuildKit
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-k3d-echo-registry.localhost:5000}/echo-agentic-todo-postfix-20260411210213-web:${IMAGE_TAG:-dev}"; \
        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename=services/web/Dockerfile \
          --output type=image,name="$ref",push=true,registry.insecure=true'

  image:web-todo:
    desc: Build and push the todo remote image with BuildKit
    cmds:
      - |
        sh -c 'set -eu; \
        ref="${PUSH_REGISTRY:-k3d-echo-registry.localhost:5000}/echo-agentic-todo-postfix-20260411210213-web-todo:${IMAGE_TAG:-dev}"; \
        buildctl-daemonless.sh build \
          --frontend dockerfile.v0 \
          --local context=. \
          --local dockerfile=. \
          --opt filename=services/web-todo/Dockerfile \
          --output type=image,name="$ref",push=true,registry.insecure=true'

  helm:template:
    desc: Render the Helm chart with the current image settings
    cmds:
      - |
        sh -c 'set -eu; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        secrets_file="${K3D_SECRETS_FILE:-}"; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        host="${INGRESS_HOST:-}"; \
        set -- -f "$values_file"; \
        if [ -n "$secrets_file" ]; then \
          set -- "$@" -f "$secrets_file"; \
        fi; \
        if [ -n "$host" ]; then \
          set -- "$@" --set-string "ingress.host=$host"; \
        fi; \
        registry="${CLUSTER_REGISTRY:-k3d-echo-registry.localhost:5000}"; \
        tag="${IMAGE_TAG:-dev}"; \
        helm template "$release" ./deploy/helm/app "$@" \
          --namespace "$ns" \
          --set-string images.app.repository="$registry/echo-agentic-todo-postfix-20260411210213-app" \
          --set-string images.app.tag="$tag" \
          --set-string images.todoApi.repository="$registry/echo-agentic-todo-postfix-20260411210213-todo-api" \
          --set-string images.todoApi.tag="$tag" \
          --set-string images.web.repository="$registry/echo-agentic-todo-postfix-20260411210213-web" \
          --set-string images.web.tag="$tag" \
          --set-string images.webTodo.repository="$registry/echo-agentic-todo-postfix-20260411210213-web-todo" \
          --set-string images.webTodo.tag="$tag"'

  deploy:
    desc: Build images with BuildKit, deploy the chart, and refresh the app namespace
    cmds:
      - task image:app
      - task image:todo-api
      - task image:web
      - task image:web-todo
      - |
        sh -c 'set -eu; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        secrets_file="${K3D_SECRETS_FILE:-}"; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        host="${INGRESS_HOST:-}"; \
        set -- -f "$values_file"; \
        if [ -n "$secrets_file" ]; then \
          set -- "$@" -f "$secrets_file"; \
        fi; \
        if [ -n "$host" ]; then \
          set -- "$@" --set-string "ingress.host=$host"; \
        fi; \
        registry="${CLUSTER_REGISTRY:-k3d-echo-registry.localhost:5000}"; \
        tag="${IMAGE_TAG:-dev}"; \
        helm upgrade --install "$release" ./deploy/helm/app "$@" \
          --namespace "$ns" \
          --create-namespace \
          --wait --timeout "${DEPLOY_TIMEOUT:-5m}" \
          --set-string images.app.repository="$registry/echo-agentic-todo-postfix-20260411210213-app" \
          --set-string images.app.tag="$tag" \
          --set-string images.todoApi.repository="$registry/echo-agentic-todo-postfix-20260411210213-todo-api" \
          --set-string images.todoApi.tag="$tag" \
          --set-string images.web.repository="$registry/echo-agentic-todo-postfix-20260411210213-web" \
          --set-string images.web.tag="$tag" \
          --set-string images.webTodo.repository="$registry/echo-agentic-todo-postfix-20260411210213-web-todo" \
          --set-string images.webTodo.tag="$tag"; \
        kubectl rollout restart deployment/"$release-app" -n "$ns"; \
        kubectl rollout restart deployment/"$release-todo-api" -n "$ns"; \
        kubectl rollout restart deployment/"$release-web" -n "$ns"; \
        kubectl rollout restart deployment/"$release-web-todo" -n "$ns"; \
        kubectl rollout status deployment/"$release-app" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-todo-api" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-web" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-web-todo" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"'

  deploy:docker:
    desc: Build images with Docker, deploy the chart, and refresh the app namespace
    cmds:
      - task docker:push:app
      - task docker:push:todo-api
      - task docker:push:web
      - task docker:push:web-todo
      - |
        sh -c 'set -eu; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        secrets_file="${K3D_SECRETS_FILE:-}"; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        host="${INGRESS_HOST:-}"; \
        set -- -f "$values_file"; \
        if [ -n "$secrets_file" ]; then \
          set -- "$@" -f "$secrets_file"; \
        fi; \
        if [ -n "$host" ]; then \
          set -- "$@" --set-string "ingress.host=$host"; \
        fi; \
        registry="${CLUSTER_REGISTRY:-k3d-echo-registry.localhost:5000}"; \
        tag="${IMAGE_TAG:-dev}"; \
        helm upgrade --install "$release" ./deploy/helm/app "$@" \
          --namespace "$ns" \
          --create-namespace \
          --wait --timeout "${DEPLOY_TIMEOUT:-5m}" \
          --set-string images.app.repository="$registry/echo-agentic-todo-postfix-20260411210213-app" \
          --set-string images.app.tag="$tag" \
          --set-string images.todoApi.repository="$registry/echo-agentic-todo-postfix-20260411210213-todo-api" \
          --set-string images.todoApi.tag="$tag" \
          --set-string images.web.repository="$registry/echo-agentic-todo-postfix-20260411210213-web" \
          --set-string images.web.tag="$tag" \
          --set-string images.webTodo.repository="$registry/echo-agentic-todo-postfix-20260411210213-web-todo" \
          --set-string images.webTodo.tag="$tag"; \
        kubectl rollout restart deployment/"$release-app" -n "$ns"; \
        kubectl rollout restart deployment/"$release-todo-api" -n "$ns"; \
        kubectl rollout restart deployment/"$release-web" -n "$ns"; \
        kubectl rollout restart deployment/"$release-web-todo" -n "$ns"; \
        kubectl rollout status deployment/"$release-app" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-todo-api" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-web" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"; \
        kubectl rollout status deployment/"$release-web-todo" -n "$ns" --timeout="${DEPLOY_TIMEOUT:-5m}"'

  deploy:docker:tm:
    desc: Build images with Docker and deploy to tm with tm values and optional tm secrets
    cmds:
      - |
        sh -c 'set -eu; \
        export K3D_VALUES_FILE="./deploy/k3d/tm.values.yaml"; \
        if [ -n "${K3D_SECRETS_FILE:-}" ]; then \
          export K3D_SECRETS_FILE; \
        elif [ -f "./deploy/k3d/tm.secrets.yaml" ]; then \
          export K3D_SECRETS_FILE="./deploy/k3d/tm.secrets.yaml"; \
        else \
          unset K3D_SECRETS_FILE 2>/dev/null || true; \
        fi; \
        task deploy:docker'

  up:
    desc: Alias for deploy
    cmds:
      - task deploy

  up:docker:
    desc: Alias for the Docker-based deploy path
    cmds:
      - task deploy:docker

  cleanup:
    desc: Tear down the deployed release from the app namespace
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        if helm status "$release" -n "$ns" >/dev/null 2>&1; then \
          helm uninstall "$release" -n "$ns" --wait; \
        else \
          echo "release $release is not deployed in $ns"; \
        fi'

  down:
    desc: Alias for cleanup
    cmds:
      - task cleanup

  status:
    desc: Show deployed resources for the app namespace
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        kubectl get pods,deploy,svc -n "$ns"'

  urls:
    desc: Print the external ingress URLs for the deployed app
    cmds:
      - |
        sh -c 'set -eu; \
        release="${APP_RELEASE_NAME:-app}"; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        default_host="$(awk '\''/^ingress:/{in_ingress=1; next} in_ingress && /^[^[:space:]]/{in_ingress=0} in_ingress && $1 == "host:" { print $2; exit } in_ingress && $1 == "-" { print $2; exit }'\'' "$values_file")"; \
        host="${INGRESS_HOST:-${default_host:-$release.localhost}}"; \
        printf "frontend: http://%s/\ntodo route: http://%s/todo/\nshell backend: http://%s/api/healthz\ntodo api: http://%s/api/todos\nremote entry: http://%s/todo/remoteEntry.js\n" "$host" "$host" "$host" "$host" "$host"'

  logs:
    desc: "Stream deployment logs (for example: task logs -- web)"
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        target="${1:-app}"; \
        kubectl logs -f -n "$ns" "deployment/$release-$target" --all-containers=true --prefix=true' -- {{.CLI_ARGS}}

  probe:app:
    desc: Probe the backend health endpoint in-cluster
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        kubectl exec -n "$ns" deployment/"$release-app" -- wget -qO- "http://127.0.0.1:8080/healthz"'

  probe:web:
    desc: Probe the frontend root in-cluster
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        kubectl exec -n "$ns" deployment/"$release-web" -- wget -qO- "http://127.0.0.1/" >/dev/null'

  probe:todo-api:
    desc: Probe the todo backend health endpoint in-cluster
    cmds:
      - |
        sh -c 'set -eu; \
        ns="${APP_NAMESPACE:-app-system}"; \
        release="${APP_RELEASE_NAME:-app}"; \
        kubectl exec -n "$ns" deployment/"$release-todo-api" -- wget -qO- "http://127.0.0.1:8080/healthz"'

  probe:app:external:
    desc: Probe the backend health endpoint through ingress from the host
    cmds:
      - |
        sh -c 'set -eu; \
        release="${APP_RELEASE_NAME:-app}"; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        default_host="$(awk '\''/^ingress:/{in_ingress=1; next} in_ingress && /^[^[:space:]]/{in_ingress=0} in_ingress && $1 == "host:" { print $2; exit } in_ingress && $1 == "-" { print $2; exit }'\'' "$values_file")"; \
        host="${INGRESS_HOST:-${default_host:-$release.localhost}}"; \
        curl --retry "${PROBE_RETRIES:-20}" --retry-delay 1 --retry-all-errors -fsS "http://$host/api/healthz"'

  probe:web:external:
    desc: Probe the frontend root through ingress from the host
    cmds:
      - |
        sh -c 'set -eu; \
        release="${APP_RELEASE_NAME:-app}"; \
        values_file="${K3D_VALUES_FILE:-./deploy/k3d/local.values.yaml}"; \
        default_host="$(awk '\''/^ingress:/{in_ingress=1; next} in_ingress && /^[^[:space:]]/{in_ingress=0} in_ingress && $1 == "host:" { print $2; exit } in_ingress && $1 == "-" { print $2; exit }'\'' "$values_file")"; \
        host="${INGRESS_HOST:-${default_host:-$release.localhost}}"; \
        curl --retry "${PROBE_RETRIES:-20}" --retry-delay 1 --retry-all-errors -fsS "http://$host/" >/dev/null'

  tilt:up:
    desc: Start the local Tilt session using the Docker deploy path
    cmds:
      - tilt up

  tilt:down:
    desc: Stop the local Tilt session and clean up the release
    cmds:
      - |
        sh -c 'tilt down >/dev/null 2>&1 || true; \
        task cleanup'

  ci:
    desc: Run whole-repo validation, deploy/probe cycle including ingress, and cleanup
    cmds:
      - task test
      - |
        sh -c 'set -eu; \
        cleanup() { task cleanup; }; \
        trap cleanup EXIT; \
        deploy_target="deploy"; \
        if ! command -v buildctl-daemonless.sh >/dev/null 2>&1; then \
          deploy_target="deploy:docker"; \
        fi; \
        task "$deploy_target"; \
        task probe:app; \
        task probe:todo-api; \
        task probe:web; \
        task probe:app:external; \
        task probe:web:external; \
        task test:e2e'

  branch:
    desc: Print the default base branch
    cmds:
      - echo main
